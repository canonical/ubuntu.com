<section {% if "/raspberry-pi-core" in request.path  %} class="p-strip" {% else %} class="p-section--deep" {% endif %}>
  <div class="row">
    <hr class="p-rule" />
    <div class="col-3 col-medium-6 p-section--shallow">
      <h2>Resources</h2>
    </div>
    <div class="col-9 col-medium-5 col-start-medium-2">
      <hr class="p-rule u-hide--small u-hide--large" />
      <div class="row">
        <div class="col-3 col-medium-2">
          <h3 class="p-heading--5">Learn more</h3>
        </div>
        <div class="col-6 col-medium-3">
          <ul class="p-list--divided">
            <li class="p-list__item"><a href="http://docs.ubuntu.com/core" data-ga-category="Contextual footer link" data-ga-action="docs.ubuntu.com/core" data-ga-label="Ubuntu Core Docs">Read the docs</a><li>
            <li class="p-list__item"><a href="http://askubuntu.com/search?q=snap" data-ga-category="Contextual footer link" data-ga-action="ask.ubuntu.com" data-ga-label="ask.ubuntu.com">Visit ask.ubuntu.com</a></li>
          </ul>
        </div>
      </div>
      <hr class="p-rule">
      <div class="row">
        <div class="col-3 col-medium-2">
          <h3 class="p-heading--5">Contribute</h3>
        </div>
        <div class="col-6 col-medium-3">
          <ul class="p-list--divided">
            <li class="p-list__item"><a href="https://snapcraft.io/first-snap" data-ga-category="Contextual footer link" data-ga-action="snapcraft.io/docs/build-snaps/your-first-snap" data-ga-label="Contribute to Ubuntu Core">Learn how to create a snap</a></li>
            <li class="p-list__item"><a href="https://github.com/snapcore/snapd" data-ga-category="Contextual footer link" data-ga-action="github.com/snapcore/snapd" data-ga-label="Contribute to Ubuntu Core">Check out the project on GitHub</a></li>
          </ul>
        </div>
      </div>
      <hr class="p-rule">
      <div class="row">
        <div class="col-3 col-medium-2">
          <h3 class="p-heading--5">Further reading</h3>
        </div>
        <div class="col-6 col-medium-3">
          <ul class="p-list--divided" id="latest-articles">
            <li class="p-list__item"><i class="p-icon--spinner u-animation--spin">Loading...</i></li>
          </ul>
          <template style="display:none" id="article-template">
            <li class="p-list__item">
              <a class="article-link article-title"></a>
            </li>
          </template>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="{{ versioned_static('js/dist/latest-news.js') }}"></script>
<script>
  canonicalLatestNews.fetchLatestNews(
    {
      articlesContainerSelector: "#latest-articles",
      articleTemplateSelector: "#article-template",
      limit: "5",
      groupId: "1666",
    }
  )
</script>
