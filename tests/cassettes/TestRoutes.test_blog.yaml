        Ubuntu and Ubuntu Pro now available on AWS European Sovereign Cloud"},"excerpt":{"rendered":"<p>Canonical
        announced it is a launch partner for the AWS European Sovereign Cloud, with
        Ubuntu and Ubuntu Pro now available. This new independent cloud for Europe
        enables organizations to run secure, enterprise workloads with full operational
