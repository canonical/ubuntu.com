        our web page creation workflow: how structured content is slashing design
        and development time"},"excerpt":{"rendered":"<p>Co-authored with Julie Muzina
        A year ago, during our Madrid Engineering Sprint, we challenged ourselves
        to dramatically reduce, or even eliminate, the need for constant design involvement
