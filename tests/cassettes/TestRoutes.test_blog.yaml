        profiles &#8211; why is RVA23 significant?"},"excerpt":{"rendered":"<p>Introduction
        One of the important offerings of the RISC-V Instruction Set Architecture
        (ISA) is the ability to customize and extend the base instruction set. An
        initial reaction to hearing this is often to worry about software portability
