        and Ubuntu Core; bringing security and scalability to device management\u00a0"},"excerpt":{"rendered":"<p>Today,
        EdgeIQ and Canonical announced the release of the EdgeIQ Coda snap and official
        support of Ubuntu Core on the EdgeIQ Symphony platform. EdgeIQ Symphony helps
