      string: '[{"id":130693,"date_gmt":"2026-06-18T17:18:12","modified_gmt":"2026-06-18T17:20:06","slug":"microcontrollers-ubuntu-core-golioth","title":{"rendered":"So
        you need to add microcontrollers to your fleet: now what?"},"excerpt":{"rendered":"<p>Your
        Ubuntu Core fleet is running beautifully. OTA updates roll out in minutes.
        Every device is strictly confined, cryptographically attested, and carrying
