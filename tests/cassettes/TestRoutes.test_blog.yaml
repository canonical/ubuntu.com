        Mythos: responding to a new threat landscape"},"excerpt":{"rendered":"<p>Canonical&#8217;s
        security philosophy has always been built on the premise that vulnerabilities
        exist and will be discovered. Our response relies on defense-in-depth architecture,
        rapid patch deployment, and strict adherence to Coordinated Vulnerability
        Disclosure (CVD). AI changes vulnerability discovery volume and speed. We
        have a robust vulnerability management process that is backed by rigorous
        compliance certifications. [&hellip;]<\/p>\n"},"author":643,"categories":[4878,4877],"tags":[],"group":[],"_start_day":"16","_start_month":"06","_start_year":"2026","_end_day":"16","_end_month":"06","_end_year":"2026","_links":{"author":[{"embeddable":true,"href":"https:\/\/admin.insights.ubuntu.com\/wp-json\/wp\/v2\/users\/643"}],"wp:featuredmedia":[{"embeddable":true,"href":"https:\/\/admin.insights.ubuntu.com\/wp-json\/wp\/v2\/media\/129741"}],"wp:term":[{"taxonomy":"category","embeddable":true,"href":"https:\/\/admin.insights.ubuntu.com\/wp-json\/wp\/v2\/categories?post=129740"},{"taxonomy":"post_tag","embeddable":true,"href":"https:\/\/admin.insights.ubuntu.com\/wp-json\/wp\/v2\/tags?post=129740"},{"taxonomy":"topic","embeddable":true,"href":"https:\/\/admin.insights.ubuntu.com\/wp-json\/wp\/v2\/topic?post=129740"},{"taxonomy":"group","embeddable":true,"href":"https:\/\/admin.insights.ubuntu.com\/wp-json\/wp\/v2\/group?post=129740"}]},"_embedded":{"author":[{"id":643,"name":"Lech
