        16.04 and 18.04\\u003c/h2\\u003e\\n\\u003cp\\u003eUbuntu goes through several
        rigorous security certifications and programs and these pages are dedicated
        to them. All certification artifacts are available with an \\u003ca href=\\\"https://ubuntu.com/advantage\\\"\\u003eUbuntu
        Advantage subscription\\u003c/a\\u003e.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca
        name=\\\"p-69233-fips-140httpsdiscourseubuntucomtfips-for-ubuntu22814-2\\\"
        class=\\\"anchor\\\" href=\\\"#p-69233-fips-140httpsdiscourseubuntucomtfips-for-ubuntu22814-2\\\"\\u003e\\u003c/a\\u003e\\u003ca
        href=\\\"https://discourse.ubuntu.com/t/fips-for-ubuntu/22814\\\"\\u003eFIPS
        140\\u003c/a\\u003e\\u003c/h2\\u003e\\n\\u003cp\\u003eFederal Information
        Processing Standards Publications (FIPS) are issued by the National Institute
        of Standards and Technology (NIST). FIPS 140-2 specifies the security requirements
        for cryptographic modules. These requirements address the areas of secure
        design and implementation.\\u003c/p\\u003e\\n\\u003cp\\u003eUbuntu LTS releases
        starting with 16.04 (Xenial) come with FIPS validated cryptographic packages,
        including the Linux kernel and OpenSSL. The full list of packages and certificates
        \\u003ca href=\\\"https://ubuntu.com/security/fips#modules\\\"\\u003eis available
        here\\u003c/a\\u003e.\\u003c/p\\u003e\\n\\u003cp\\u003eFor more information
        on FIPS certification on Ubuntu see the \\u003ca href=\\\"https://discourse.ubuntu.com/t/fips-for-ubuntu/22814\\\"\\u003eFIPS
        Information and Installation Guide\\u003c/a\\u003e.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca
        name=\\\"p-69233-cishttpsdiscourseubuntucomtcustomizing-the-cis-profile26088-3\\\"
        class=\\\"anchor\\\" href=\\\"#p-69233-cishttpsdiscourseubuntucomtcustomizing-the-cis-profile26088-3\\\"\\u003e\\u003c/a\\u003e\\u003ca
        href=\\\"https://discourse.ubuntu.com/t/customizing-the-cis-profile/26088\\\"\\u003eCIS\\u003c/a\\u003e\\u003c/h2\\u003e\\n\\u003cp\\u003eUbuntu
        LTS releases starting with 16.04 (Xenial) have compliance benchmark documents
        developed by the Center for Internet Security (CIS).\\u003c/p\\u003e\\n\\u003cp\\u003eFor
        more information see the \\u003ca href=\\\"https://discourse.ubuntu.com/t/cis-compliance-for-ubuntu/22818\\\"\\u003eCIS
        Compliance for Ubuntu 16.04 and 18.04\\u003c/a\\u003e.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca
        name=\\\"p-69233-common-criteriahttpsdiscourseubuntucomtcommon-criteria-for-ubuntu22817-4\\\"
        class=\\\"anchor\\\" href=\\\"#p-69233-common-criteriahttpsdiscourseubuntucomtcommon-criteria-for-ubuntu22817-4\\\"\\u003e\\u003c/a\\u003e\\u003ca
        href=\\\"https://discourse.ubuntu.com/t/common-criteria-for-ubuntu/22817\\\"\\u003eCommon
        Criteria\\u003c/a\\u003e\\u003c/h2\\u003e\\n\\u003cp\\u003eCommon Criteria
        for Information Technology Security Evaluation (CC) is an international standard.
        The CC provides a common set of requirements for the security functionality
        of IT products and for assurance measures applied to these IT products during
        a security evaluation.\\u003c/p\\u003e\\n\\u003cp\\u003eThe evaluation process
        establishes a level of confidence that the security functionality of these
        IT products and the assurance measures applied to these IT products meet these
        requirements:\\u003c/p\\u003e\\n\\u003cp\\u003eFor more information on the
        Common Criteria certification on Ubuntu see the \\u003ca href=\\\"https://discourse.ubuntu.com/t/common-criteria-for-ubuntu/22817\\\"\\u003eCommon
        Criteria Guide\\u003c/a\\u003e.\\u003c/p\\u003e\\n\\u003ch2\\u003e\\u003ca
