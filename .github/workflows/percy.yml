name: Percy testing on PRs targeting main
run-name: Testing Percy on branch ${{ github.head_ref }}


on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

concurrency:
  group: percy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  decide:
    name: Decide whether to run Percy
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: .github/actions/percy-gate
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: gate
        uses: ./.github/actions/percy-gate
        with:
          mode: pr

  snapshot:
    name: Take Percy snapshots
    runs-on: ubuntu-latest
    needs: decide
    if: needs.decide.result == 'success' && needs.decide.outputs.should_run == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout SCM
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Get merge base commit SHA
        id: base_commit
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          echo "sha=$(git merge-base HEAD origin/$BASE_REF)" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/percy-snapshot
        with:
          base_ref: ${{ github.base_ref }}
          base_commit: ${{ steps.base_commit.outputs.sha }}
          branch_name: ${{ github.head_ref }}
          commitsh: ${{ github.event.pull_request.head.sha }}
          percy_token_write: ${{ secrets.PERCY_TOKEN_WRITE }}
