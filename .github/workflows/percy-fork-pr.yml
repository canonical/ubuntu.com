name: Percy testing on PRs from forks
run-name: "Testing Percy on fork PR #${{ github.event.pull_request.number }}"

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: percy-fork-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  decide:
    name: Decide whether to run Percy
    runs-on: ubuntu-latest
    # Only run for forks; internal PRs use percy.yml
    if: github.event.pull_request.head.repo.full_name != github.repository
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
    steps:
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            visual:
              - 'static/sass/**'
              - 'static/js/src/**'
              - 'templates/**'
              - 'navigation.yaml'
              - 'secondary-navigation.yaml'
              - 'snapshots.js'
              - 'test-links.yaml'
              - 'package.json'
              - 'yarn.lock'

      - name: Evaluate gate
        id: evaluate
        env:
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-percy') }}
          ACTOR: ${{ github.event.pull_request.user.login }}
          VISUAL_CHANGED: ${{ steps.filter.outputs.visual }}
        run: |
          set -e
          if [ "$HAS_LABEL" = "true" ]; then
            echo "RUN: run-percy label present"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$ACTOR" = "dependabot[bot]" ] || [ "$ACTOR" = "renovate[bot]" ]; then
            echo "SKIP: bot author ($ACTOR) without run-percy label"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$VISUAL_CHANGED" = "true" ]; then
            echo "RUN: visual-affecting files changed"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "SKIP: no visual-affecting changes and no run-percy label"
          echo "should_run=false" >> "$GITHUB_OUTPUT"

  snapshot:
    name: Take Percy snapshots
    runs-on: ubuntu-latest
    needs: decide
    if: needs.decide.result == 'success' && needs.decide.outputs.should_run == 'true'

    # The environment "percy-testing" handles the approval gate
    environment: percy-testing

    steps:
      - name: Checkout Trusted Action
        uses: actions/checkout@v4
        with:
          path: trusted-logic
          persist-credentials: false

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: untrusted-pr-code
          persist-credentials: false

      - name: Get merge base commit SHA
        id: base_commit
        env:
          BASE_REF: ${{ github.base_ref }}
          FORK_CLONE_URL: ${{ github.event.pull_request.head.repo.clone_url }}
          FORK_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          cd trusted-logic
          git fetch origin "$BASE_REF"
          git fetch "$FORK_CLONE_URL" "$FORK_REF"
          echo "sha=$(git merge-base FETCH_HEAD origin/$BASE_REF)" >> $GITHUB_OUTPUT

      - uses: ./trusted-logic/.github/actions/percy-snapshot
        with:
          project_root: ./untrusted-pr-code
          base_ref: ${{ github.base_ref }}
          base_commit: ${{ steps.base_commit.outputs.sha }}
          pr_number: ${{ github.event.pull_request.number }}
          branch_name: ${{ github.event.pull_request.head.ref }}
          commitsh: ${{ github.event.pull_request.head.sha }}
          percy_token_write: ${{ secrets.PERCY_TOKEN_WRITE }}
