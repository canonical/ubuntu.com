name: Automatic Rebase
on:
  issue_comment:
    types: [created]

jobs:
  rebase:
    name: Rebase
    runs-on: ubuntu-latest
    # Added security: Only allow Repo Owners, Members, or Collaborators to trigger
    if: >-
      github.event.issue.pull_request != '' && 
      (
        github.event.comment.author_association == 'OWNER' || 
        github.event.comment.author_association == 'MEMBER' || 
        github.event.comment.author_association == 'COLLABORATOR'
      ) &&
      (
        startsWith(github.event.comment.body, '/rebase') || 
        startsWith(github.event.comment.body, '/autosquash')
      )
    steps:
      - name: Checkout the latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REBASE_TOKEN }}
          fetch-depth: 0 # otherwise, you will fail to push refs to dest repo
      - name: Automatic Rebase
        uses: cirrus-actions/rebase@1.8
        with:
          autosquash: ${{ contains(github.event.comment.body, '/autosquash') || contains(github.event.comment.body, '/rebase-autosquash') }}
        env:
          GITHUB_TOKEN: ${{ secrets.REBASE_TOKEN }}
