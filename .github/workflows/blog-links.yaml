name: Blog Links

on:
  # QA
  pull_request:
  schedule:
    - cron: "20 7 * * 1"

jobs:
  check-links:
    if: github.repository == 'canonical/ubuntu.com'
    runs-on: ubuntu-latest

    steps:
      - name: Install linkchecker
        run: sudo pip install LinkChecker

      - name: Write linkchecker config file
        run: |
          mkdir -p ~/.linkchecker
          cat > ~/.linkchecker/linkcheckerrc <<EOF
          [checking]
          maxrequestspersecond=5
          recursionlevel=2
          timeout=1000
          sslverify=0

          [filtering]
          checkextern=1
          nofollow=
            !https://ubuntu.com/blog
          ignore=
            https://res.cloudinary.com
            q_auto
            fl_sanitize
            c_fill
            e_sharpen
            w_[0-9]*
            h_[0-9]*
            https://ubuntu.com/.*sitemap.*\.xml
            https://www.amd.com/*

          [output]
          status=0
          warnings=0
          ignoreerrors=
            ^https?://.* ^.*(471|503|504)
            ^https?://.* Connection aborted
            ^https?://.* Connection reset by peer
            ^https?://.* RemoteDisconnected
            ^https?://.* Read timed out
          EOF

      - name: Run linkchecker on ubuntu.com/blog
        run: linkchecker --no-warnings https://ubuntu.com/blog

      - name: Send message on failure
        if: failure()
        run: curl -X POST -F "workflow=${GITHUB_WORKFLOW}" -F "repo_name=${GITHUB_REPOSITORY}" -F "action_id=${GITHUB_RUN_ID}" ${{ secrets.BOT_URL }}?room=marketing-pub
