version: "3"

vars:
  VENV_DIR: .venv
  VENV_BIN: "{{ .VENV_DIR }}/bin"
  PYTHON_BIN: "{{ .VENV_BIN }}/python3"
  PIP_BIN: "{{ .VENV_BIN }}/pip3"

env:
  PORT: 8001
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"
  PATH: "{{ .VENV_BIN }}:$PATH"

dotenv: [".env.local", ".env"]

# Run "task --list" to see available tasks.
tasks:
  default:
    cmds:
      - task: start

  start:
    desc: "Start the project"
    deps:
      - install
    cmds:
      - '{{if .MOUNT}}PYTHONPATH="{{ .MOUNT }}:$PYTHONPATH" {{end}}yarn start'

  install:
    desc: "Install Python and Node.js binaries and their packages"
    deps:
      - install-python
      - install-yarn
    cmds:
      - echo "Installation complete"

  shell:
    desc: "Open a shell with the virtual environment activated"
    deps:
      - install
    cmds:
      - $SHELL

  clean:
    cmds:
      - rm -rf static/css static/js/dist node_modules {{ .VENV_DIR }} .task

  test-python:
    desc: "Run Python tests with coverage"
    deps:
      - install
    cmds:
      - '{{if .MOUNT}}PYTHONPATH="{{ .MOUNT }}:$PYTHONPATH" {{end}}coverage run --source=webapp -m unittest $(find tests/ -name "test_*.py" ! -name "test_marketo.py")'

  test-js:
    desc: "Run JS tests with coverage"
    deps:
      - install-yarn
    cmds:
      - yarn test-js --coverage

  test:
    desc: "Run all project tests"
    cmds:
      - task: test-python
      - task: test-js

  lint-scss:
    desc: "Lint SCSS"
    deps:
      - install-yarn
    cmds:
      - yarn lint-scss

  lint-js:
    desc: "Lint JS"
    deps:
      - install-yarn
    cmds:
      - yarn lint-js

  lint-ts:
    desc: "Lint TS"
    deps:
      - install-yarn
    cmds:
      - yarn lint-ts

  lint-python:
    desc: "Lint Python"
    deps:
      - install
    cmds:
      - '{{if .MOUNT}}PYTHONPATH="{{ .MOUNT }}:$PYTHONPATH" {{end}}yarn lint-python'

  check-prettier:
    desc: "Check Prettier formatting"
    deps:
      - install-yarn
    cmds:
      - yarn check-prettier

  lint:
    desc: "Run all project linting"
    cmds:
      - task: lint-scss
      - task: lint-js
      - task: lint-ts
      - task: lint-python
      - task: check-prettier

  format:
    desc: "Run all project formatting"
    deps:
      - install
    cmds:
      - yarn format-python
      - yarn format-prettier
      - npx stylelint --fix static/**/*.scss

  build:
    desc: "Build the project static files"
    deps:
      - install
    cmds:
      - '{{if .MOUNT}}PYTHONPATH="{{ .MOUNT }}:$PYTHONPATH" {{end}}yarn build'

  # Custom tools versioning setup (mise, python, node, etc.)
  setup-mise:
    internal: true
    desc: "Setup mise"
    preconditions:
      - which curl
    status:
      - ! which mise
    cmds:
      - curl https://mise.run | sh

  setup-python:
    internal: true
    deps:
      - setup-mise
    cmds:
      - mise install python@{{ .PYTHON_VERSION }}

  setup-node:
    internal: true
    deps:
      - setup-mise
    cmds:
      - mise install node@{{ .NODE_VERSION }}

  # Python virtual environment
  venv:
    internal: true
    desc: "Setup python virtual environment"
    deps:
      - setup-python
    status:
      - ! -f {{ .PYTHON_BIN }}
    cmds:
      - mise exec python@{{ .PYTHON_VERSION }} -- python3 -m venv .venv
      - echo "Using Python $({{ .PYTHON_BIN }} --version)"

  install-python:
    internal: true
    desc: "Install python packages"
    deps:
      - venv
    sources:
      - requirements.txt
    generates:
      - "{{ .VENV_DIR }}/*"
    cmds:
      - "{{ .PIP_BIN }} install -r requirements.txt"

  # Node.js package manager
  install-yarn:
    internal: true
    desc: "Install yarn packages"
    deps:
      - setup-node
    status:
      - which yarn
      - which node
    sources:
      - yarn.lock
      - package.json
    generates:
      - "node_modules/**"
    cmds:
      - yarn install
